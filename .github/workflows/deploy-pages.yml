name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages so it can be tested live.
# Requires: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you deploy any branch manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turn on Pages (Actions source) automatically — no manual Settings step

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # the app is served from the repository root (index.html)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
