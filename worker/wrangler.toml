name = "blue-scribes-proxy"
main = "blue-scribes-proxy.js"
compatibility_date = "2024-11-01"

# Secrets are NOT stored here. Set them once after first deploy:
#   wrangler secret put ANTHROPIC_API_KEY      # your sk-ant-... key
#   wrangler secret put STRIPE_SECRET_KEY      # sk_live_ / sk_test_...
#   wrangler secret put STRIPE_WEBHOOK_SECRET  # whsec_... (from the webhook endpoint)

[vars]
# Lock this down to your site's origin (scheme + host only, no path/trailing slash).
ALLOWED_ORIGIN = "https://morgensternprinting.github.io"
SITE_URL = "https://morgensternprinting.github.io/TheBlueScribes"
MODEL = "claude-opus-4-8"
MAX_TOKENS = "8192"

# Token wallet settings.
WELCOME_TOKENS = "10000"       # credit granted on sign-up
BILLING_GRANULARITY = "1000"   # debits are rounded up to this many tokens

# Stripe Price IDs for the three token packs (create them in the Stripe dashboard).
# Token amounts per pack are fixed in the Worker (PACK_TOKENS): small 100k,
# medium 500k, large 1.2M. Make the Stripe prices match what you want to charge.
STRIPE_PRICE_SMALL = "price_REPLACE_SMALL"
STRIPE_PRICE_MEDIUM = "price_REPLACE_MEDIUM"
STRIPE_PRICE_LARGE = "price_REPLACE_LARGE"

# D1 database (accounts + token wallet + ledger). Create it once:
#   wrangler d1 create blue-scribes-db
# then paste the printed database_id below and apply the schema:
#   wrangler d1 execute blue-scribes-db --remote --file=worker/schema.sql
[[d1_databases]]
binding = "DB"
database_name = "blue-scribes-db"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"
